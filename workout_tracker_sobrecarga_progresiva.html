<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Gym Tracker Pro</title>
  <meta name="theme-color" content="#0d0d0d">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --bg-color: #0d0d0d;
      --bg-surface: #1a1a1a;
      --bg-surface-elevated: #262626;
      --text-primary: #ffffff;
      --text-secondary: #a0a0a0;
      --accent-blue: #3b82f6;
      --accent-green: #22c55e;
      --accent-green-bg: rgba(34, 197, 94, 0.15);
      --border-color: #333;
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: var(--font-sans); background-color: var(--bg-color); color: var(--text-primary); line-height: 1.5; padding-bottom: 40px; }

    /* Header & Nav */
    .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; background-color: rgba(13, 13, 13, 0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--border-color); }
    .logo { display: flex; align-items: center; gap: 8px; }
    .logo h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .streak-badge { background: rgba(245, 158, 11, 0.15); color: #f59e0b; padding: 4px 10px; border-radius: 20px; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 4px; }
    main { padding: 16px; max-width: 600px; margin: 0 auto; }

    /* Today's Workout Card */
    .today-card { background: linear-gradient(135deg, var(--bg-surface-elevated), var(--bg-surface)); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 20px; text-align: center; box-shadow: var(--shadow-sm); }
    .today-title { font-size: 14px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .today-workout { font-size: 18px; font-weight: 700; color: var(--accent-blue); }

    /* Tabs */
    .tabs-container { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 16px; scrollbar-width: none; }
    .tabs-container::-webkit-scrollbar { display: none; }
    .day-btn { padding: 8px 16px; font-size: 14px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--bg-surface); color: var(--text-secondary); white-space: nowrap; font-weight: 500; cursor: pointer; transition: all 0.2s ease; }
    .day-btn.active { background: var(--text-primary); color: var(--bg-color); border-color: var(--text-primary); }
    .day-btn.rest { border-style: dashed; opacity: 0.7; }

    /* Progress Bar */
    .progress-container { background: var(--bg-surface-elevated); border-radius: 10px; height: 8px; width: 100%; margin-bottom: 20px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--accent-green); transition: width 0.3s ease; }
    .progress-text { font-size: 12px; color: var(--text-secondary); text-align: right; margin-bottom: 8px; }

    /* Exercise Cards */
    .ex-card { background: var(--bg-surface); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow-sm); animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .muscle-badge { display: inline-flex; align-items: center; font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 20px; margin-bottom: 12px; letter-spacing: 0.3px; }
    .ex-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
    .ex-title { font-size: 15px; font-weight: 600; line-height: 1.4; }
    .tag-badge { font-size: 10px; padding: 2px 8px; border-radius: 12px; font-weight: 700; margin-left: 6px; vertical-align: middle; }
    .timer-btn { font-size: 12px; padding: 6px 12px; border-radius: var(--radius-md); border: 1px solid var(--border-color); background: var(--bg-surface-elevated); color: var(--text-primary); font-weight: 500; white-space: nowrap; flex-shrink: 0; }
    
    /* Set Grid */
    .set-grid { display: grid; grid-template-columns: 32px 1fr 1fr 1fr; gap: 8px; align-items: center; margin-bottom: 8px; }
    .set-grid-header { font-size: 11px; color: var(--text-secondary); text-align: center; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
    input[type=number] { -moz-appearance: textfield; appearance: textfield; }
    input[type=number]::-webkit-outer-spin-button, input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    
    .weight-input-group { display: flex; align-items: center; background: var(--bg-surface-elevated); border: 1px solid var(--border-color); border-radius: var(--radius-md); overflow: hidden; transition: all 0.2s; }
    .weight-input-group:focus-within { border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
    .weight-input-group.improved { border-color: var(--accent-green); background: var(--accent-green-bg); }
    .set-inp-w { width: 100%; padding: 10px 4px; font-size: 15px; font-weight: 600; border: none; background: transparent; color: var(--text-primary); text-align: center; outline: none; }
    .unit-select { background: transparent; color: var(--text-secondary); border: none; font-size: 11px; padding: 0 4px; outline: none; cursor: pointer; }
    .unit-select option { background: var(--bg-surface); color: var(--text-primary); }

    .set-inp-r { width: 100%; padding: 10px 4px; font-size: 15px; font-weight: 600; border-radius: var(--radius-md); border: 1px solid var(--border-color); background: var(--bg-surface-elevated); color: var(--text-primary); text-align: center; transition: all 0.2s; }
    .set-inp-r:focus { outline: none; border-color: var(--accent-blue); box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.2); }
    .set-inp-r.improved { border-color: var(--accent-green); background: var(--accent-green-bg); color: var(--accent-green); }

    .prev-val { font-size: 11px; color: var(--text-secondary); text-align: center; font-variant-numeric: tabular-nums; }
    .prev-val.improved-text { color: var(--accent-green); font-weight: 600; }

    .ex-footer { margin-top: 16px; padding-top: 12px; border-top: 1px solid var(--border-color); font-size: 12px; color: var(--text-secondary); display: flex; justify-content: space-between; }

    /* Next Button */
    .next-btn { width: 100%; padding: 14px; font-size: 15px; font-weight: 600; border-radius: var(--radius-md); border: 1px solid var(--accent-blue); background: rgba(59, 130, 246, 0.1); color: var(--accent-blue); margin-top: 10px; transition: all 0.2s; cursor: pointer; }
    .next-btn:active { background: rgba(59, 130, 246, 0.2); }

    /* Timer Bar */
    .active-timer-card { display: flex; align-items: center; gap: 16px; background: var(--bg-surface); border: 1px solid var(--accent-blue); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 20px; box-shadow: 0 4px 12px rgba(59, 130, 246, 0.15); }
    .t-num { font-size: 28px; font-weight: 700; min-width: 65px; font-variant-numeric: tabular-nums; }
    .t-progress-bg { flex: 1; height: 8px; background: var(--bg-color); border-radius: 4px; overflow: hidden; }
    .t-progress-fill { height: 100%; border-radius: 4px; transition: width 1s linear, background-color 0.3s; }

    /* Save Button Area */
    .save-area { margin-top: 24px; padding-bottom: 20px; }
    .save-btn { width: 100%; padding: 16px; font-size: 16px; font-weight: 600; border-radius: var(--radius-lg); border: none; background: var(--text-primary); color: var(--bg-color); box-shadow: 0 4px 12px rgba(255, 255, 255, 0.15); transition: transform 0.1s; cursor: pointer; }
    .save-btn:active { transform: scale(0.97); }

    /* Toast */
    .toast { position: fixed; left: 50%; transform: translateX(-50%) translateY(150px); bottom: 24px; background: var(--accent-green); color: #000; padding: 12px 24px; border-radius: 30px; font-weight: 600; font-size: 14px; box-shadow: 0 4px 12px rgba(34, 197, 94, 0.3); transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 1000; }
    .toast.show { transform: translateX(-50%) translateY(0); }

    /* Rest Day */
    .rest-card { background: var(--bg-surface); border: 1px dashed var(--border-color); border-radius: var(--radius-lg); padding: 40px 20px; text-align: center; }
    .rest-card h3 { font-size: 20px; margin-bottom: 8px; color: var(--text-primary); }
    .rest-card p { color: var(--text-secondary); font-size: 14px; }
  </style>
</head>
<body>
  
  <header class="top-nav">
    <div class="logo">
      <svg width="24" height="24" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M120 256 L392 256 M120 200 L120 312 M392 200 L392 312 M180 220 L180 292 M332 220 L332 292" stroke="var(--accent-blue)" stroke-width="40" stroke-linecap="round"/>
      </svg>
      <h1>Gym Tracker</h1>
    </div>
    <div class="streak-badge">
      🔥 <span id="streak-count">0</span> días
    </div>
  </header>

  <main>
    <div class="today-card" id="today-card">
      <div class="today-title">Hoy toca entrenar</div>
      <div class="today-workout" id="today-workout-text">Cargando...</div>
    </div>

    <div id="app"></div>
  </main>

  <div id="toast" class="toast">Guardado correctamente</div>

  <script>
    const MC = {
      "Pecho": { bg: "rgba(59, 130, 246, 0.15)", c: "#60a5fa" },
      "Hombros": { bg: "rgba(139, 92, 246, 0.15)", c: "#a78bfa" },
      "Tríceps": { bg: "rgba(239, 68, 68, 0.15)", c: "#f87171" },
      "Espalda": { bg: "rgba(34, 197, 94, 0.15)", c: "#4ade80" },
      "Trapecio inferior": { bg: "rgba(20, 184, 166, 0.15)", c: "#2dd4bf" },
      "Delt. Posterior": { bg: "rgba(236, 72, 153, 0.15)", c: "#f472b6" },
      "Bíceps": { bg: "rgba(236, 72, 153, 0.15)", c: "#f472b6" },
      "Antebrazos": { bg: "rgba(107, 114, 128, 0.15)", c: "#9ca3af" },
      "Cuádriceps": { bg: "rgba(245, 158, 11, 0.15)", c: "#fbbf24" },
      "Isquios / Glúteos": { bg: "rgba(245, 158, 11, 0.15)", c: "#fbbf24" },
      "Isquios": { bg: "rgba(245, 158, 11, 0.15)", c: "#fbbf24" },
      "Aductor": { bg: "rgba(245, 158, 11, 0.15)", c: "#fbbf24" },
      "Pantorrillas": { bg: "rgba(245, 158, 11, 0.15)", c: "#fbbf24" },
      "Delt. Post. + Trap.": { bg: "rgba(20, 184, 166, 0.15)", c: "#2dd4bf" },
      "Trapecio": { bg: "rgba(20, 184, 166, 0.15)", c: "#2dd4bf" },
      "Piernas (2a freq)": { bg: "rgba(245, 158, 11, 0.15)", c: "#fbbf24" }
    };

    const R = {
      Martes:{ label:"Push A — Pecho · Hombros · Tríceps", exercises:[ {id:"ma1",muscle:"Pecho",name:"Press inclinado con mancuernas (30–45°)",tag:"PRINCIPAL",sets:4,range:"8–12",rest:"2:30–3 min",restS:165}, {id:"ma2",muscle:"Pecho",name:"Press de banca plano con barra",sets:3,range:"6–10",rest:"2:30 min",restS:150}, {id:"ma3",muscle:"Pecho",name:"Fly en polea (cable crossover)",sets:3,range:"12–15",rest:"1:30–2 min",restS:105}, {id:"ma4",muscle:"Hombros",name:"Press militar con mancuernas sentado",tag:"NUEVO",sets:3,range:"10–12",rest:"2 min",restS:120}, {id:"ma5",muscle:"Hombros",name:"Elevaciones laterales en polea — dropset",sets:4,range:"15–20",rest:"1:30 min",restS:90}, {id:"ma6",muscle:"Tríceps",name:"Extensión overhead en polea (cuerda)",tag:"NUEVO",sets:3,range:"10–15",rest:"1:30–2 min",restS:105}, {id:"ma7",muscle:"Tríceps",name:"Pushdown en polea (cuerda o barra)",sets:3,range:"12–15",rest:"1:30 min",restS:90} ] },
      Miércoles:{ label:"Pull A — Espalda · Trap. Inf. · Delt. Post. · Bíceps", exercises:[ {id:"mi1",muscle:"Espalda",name:"Remo con barra inclinado (overhand)",tag:"PRINCIPAL",sets:4,range:"8–12",rest:"2:30 min",restS:150}, {id:"mi2",muscle:"Espalda",name:"Remo en polea baja (barra estrecha)",sets:3,range:"10–12",rest:"2 min",restS:120}, {id:"mi3",muscle:"Espalda",name:"Dominadas agarre prono",sets:4,range:"6–10",rest:"2:30 min",restS:150}, {id:"mi4",muscle:"Trapecio inferior",name:"Cable Y-raise en polea baja",tag:"NUEVO",sets:3,range:"12–15",rest:"1:30 min",restS:90}, {id:"mi5",muscle:"Trapecio inferior",name:"Retracción + depresión escapular en remo en T",sets:3,range:"12–15",rest:"1:30 min",restS:90}, {id:"mi6",muscle:"Delt. Posterior",name:"Face pulls en polea",tag:"NUEVO",sets:3,range:"15–20",rest:"1:30 min",restS:90}, {id:"mi7",muscle:"Delt. Posterior",name:"Reverse fly con mancuernas (bent-over)",tag:"NUEVO",sets:3,range:"15–20",rest:"1:30 min",restS:90}, {id:"mi8",muscle:"Bíceps",name:"Curl con barra Z (EZ)",sets:3,range:"8–12",rest:"1:30–2 min",restS:105}, {id:"mi9",muscle:"Bíceps",name:"Curl inclinado con mancuernas (stretch)",sets:3,range:"10–12",rest:"1:30 min",restS:90}, {id:"mi10",muscle:"Bíceps",name:"Curl martillo con mancuerna",sets:2,range:"12–15",rest:"1:30 min",restS:90}, {id:"mi11",muscle:"Antebrazos",name:"Curl muñeca + invertido (opcional)",sets:2,range:"15",rest:"1 min",restS:60} ] },
      Jueves:{ label:"Piernas — Cuáds · Isquios · Glúteos · Pantorrillas", exercises:[ {id:"ju1",muscle:"Cuádriceps",name:"Sentadilla con barra o Hack squat",tag:"PRINCIPAL",sets:4,range:"8–12",rest:"2:30–3 min",restS:165}, {id:"ju2",muscle:"Cuádriceps",name:"Prensa 45° (leg press)",sets:3,range:"10–15",rest:"2–2:30 min",restS:135}, {id:"ju3",muscle:"Cuádriceps",name:"Extensiones de pierna",sets:3,range:"12–15",rest:"1:30 min",restS:90}, {id:"ju4",muscle:"Isquios / Glúteos",name:"Romanian Deadlift (RDL)",tag:"NUEVO",sets:4,range:"10–12",rest:"2–2:30 min",restS:135}, {id:"ju5",muscle:"Isquios",name:"Curl femoral sentado",sets:3,range:"10–12",rest:"1:30–2 min",restS:105}, {id:"ju6",muscle:"Aductor",name:"Aductor interno en máquina",sets:3,range:"12–15",rest:"1:30 min",restS:90}, {id:"ju7",muscle:"Pantorrillas",name:"Pantorrilla de pie (calf raise)",sets:4,range:"12–20",rest:"1:30 min",restS:90} ] },
      Sábado:{ label:"Push B — Pecho · Hombros · Tríceps", exercises:[ {id:"sa1",muscle:"Pecho",name:"Press de banca plano con barra",tag:"PRINCIPAL",sets:4,range:"6–10",rest:"2:30–3 min",restS:165}, {id:"sa2",muscle:"Pecho",name:"Press inclinado con mancuernas",sets:3,range:"10–12",rest:"2 min",restS:120}, {id:"sa3",muscle:"Pecho",name:"Pec deck o fly con mancuernas",sets:3,range:"12–15",rest:"1:30 min",restS:90}, {id:"sa4",muscle:"Pecho",name:"Fondos en paralelas (dips)",tag:"NUEVO",sets:3,range:"8–12",rest:"2 min",restS:120}, {id:"sa5",muscle:"Hombros",name:"Press con mancuernas o máquina",sets:3,range:"10–12",rest:"2 min",restS:120}, {id:"sa6",muscle:"Hombros",name:"Elevaciones laterales en polea — dropset",sets:4,range:"15–20",rest:"1:30 min",restS:90}, {id:"sa7",muscle:"Tríceps",name:"Extensión overhead en polea (cuerda)",sets:3,range:"10–15",rest:"1:30–2 min",restS:105}, {id:"sa8",muscle:"Tríceps",name:"Press agarre cerrado con barra Z",sets:3,range:"10–13",rest:"2 min",restS:120} ] },
      Domingo:{ label:"Pull B — Espalda · Trap. · Delt. Post. · Bíceps + Piernas", exercises:[ {id:"do1",muscle:"Espalda",name:"Dominadas asistidas (3 seg bajada)",tag:"PRINCIPAL",sets:4,range:"6–10",rest:"2:30 min",restS:150}, {id:"do2",muscle:"Espalda",name:"Remo en T (agarre supino / underhand)",sets:3,range:"8–12",rest:"2 min",restS:120}, {id:"do3",muscle:"Espalda",name:"Jalón polea agarre cerrado supino",sets:3,range:"10–12",rest:"2 min",restS:120}, {id:"do4",muscle:"Delt. Post. + Trap.",name:"Face pulls en polea",sets:3,range:"15–20",rest:"1:30 min",restS:90}, {id:"do5",muscle:"Delt. Post. + Trap.",name:"Cable Y-raise en polea baja",sets:3,range:"12–15",rest:"1:30 min",restS:90}, {id:"do6",muscle:"Trapecio",name:"Encogimientos con mancuernas (shrugs)",tag:"NUEVO",sets:3,range:"12–15",rest:"1:30 min",restS:90}, {id:"do7",muscle:"Bíceps",name:"Curl predicador o spider curl",sets:3,range:"10–12",rest:"1:30 min",restS:90}, {id:"do8",muscle:"Bíceps",name:"Curl martillo alternado",sets:3,range:"12–15",rest:"1:30 min",restS:90}, {id:"do9",muscle:"Piernas (2a freq)",name:"Hack squat o leg press (60–70% peso)",sets:3,range:"12–15",rest:"2 min",restS:120}, {id:"do10",muscle:"Piernas (2a freq)",name:"Curl femoral sentado",sets:3,range:"12–15",rest:"1:30 min",restS:90} ] }
    };

    const ALL_DAYS=["Lunes","Martes","Miércoles","Jueves","Viernes","Sábado","Domingo"];
    const TRAIN_DAYS=["Martes","Miércoles","Jueves","Sábado","Domingo"];

    let state = {
      activeDay: "",
      currentExerciseIndex: 0,
      entry: {},
      prevSessions: {},
      timerSecs: 0,
      timerActive: false,
      timerMax: 0,
      streak: 0,
      lastWorkoutDate: "",
    };
    let timerInterval = null;

    function init() {
      loadData();
      const todayIndex = new Date().getDay() || 7;
      const todayName = ALL_DAYS[todayIndex - 1];
      setDay(todayName);
    }

    function initEntry(day) {
      const e = {};
      if(!R[day]) return e;
      for(const ex of R[day].exercises){
        e[ex.id] = Array(ex.sets).fill(null).map(() => ({ w: "", r: "", u: "kg" }));
      }
      return e;
    }

    function loadData() {
      try {
        const savedStats = localStorage.getItem('gymStats');
        if (savedStats) {
          const parsed = JSON.parse(savedStats);
          state.streak = parsed.streak || 0;
          state.lastWorkoutDate = parsed.lastWorkoutDate || "";
        }
        
        if (state.lastWorkoutDate) {
          const last = new Date(state.lastWorkoutDate);
          const today = new Date();
          last.setHours(0,0,0,0);
          today.setHours(0,0,0,0);
          const diffDays = Math.ceil(Math.abs(today - last) / (1000 * 60 * 60 * 24)); 
          if (diffDays > 1) state.streak = 0;
        }

        document.getElementById('streak-count').textContent = state.streak;

        for (const d of TRAIN_DAYS) {
          const r = localStorage.getItem("wk:" + d);
          if (r) state.prevSessions[d] = JSON.parse(r);
        }
      } catch(e) {}
    }

    function setDay(d) {
      state.activeDay = d;
      state.currentExerciseIndex = 0;
      state.entry = initEntry(d);
      
      const el = document.getElementById('today-workout-text');
      if (TRAIN_DAYS.includes(d)) {
        el.textContent = R[d].label;
        el.style.color = "var(--accent-blue)";
      } else {
        el.textContent = "Día de Descanso";
        el.style.color = "var(--text-secondary)";
      }

      stopTimer();
      render();
    }

    function nextExercise() {
      const day = R[state.activeDay];
      if (day && state.currentExerciseIndex < day.exercises.length - 1) {
        state.currentExerciseIndex++;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function prevExercise() {
      if (state.currentExerciseIndex > 0) {
        state.currentExerciseIndex--;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }

    function updateSet(exId, idx, field, val) {
      if(!state.entry[exId]) return;
      state.entry[exId][idx][field] = val;
      
      const prev = state.prevSessions[state.activeDay]?.data?.[exId]?.[idx];
      if (prev) {
        const cw = parseFloat(state.entry[exId][idx].w) || 0;
        const cr = parseFloat(state.entry[exId][idx].r) || 0;
        const pw = parseFloat(prev.w) || 0;
        const pr = parseFloat(prev.r) || 0;
        const isImproved = (cw > pw) || (cw === pw && cr > pr && cw > 0);
        
        const wGrp = document.getElementById(`grp_${exId}_${idx}_w`);
        const rInp = document.getElementById(`inp_${exId}_${idx}_r`);
        const prevEl = document.getElementById(`prev_${exId}_${idx}`);
        
        if (isImproved) {
          if(wGrp) wGrp.classList.add('improved');
          if(rInp) rInp.classList.add('improved');
          if(prevEl) prevEl.classList.add('improved-text');
        } else {
          if(wGrp) wGrp.classList.remove('improved');
          if(rInp) rInp.classList.remove('improved');
          if(prevEl) prevEl.classList.remove('improved-text');
        }
      }
    }

    function saveSession() {
      if (!TRAIN_DAYS.includes(state.activeDay)) return;

      const isoDate = new Date().toISOString();
      const displayDate = new Date().toLocaleDateString("es-MX", { day: "2-digit", month: "2-digit", year: "numeric" });
      const payload = { date: displayDate, data: state.entry };
      
      const todayStr = new Date().toDateString();
      const lastDateStr = state.lastWorkoutDate ? new Date(state.lastWorkoutDate).toDateString() : "";
      
      if (lastDateStr !== todayStr) {
        state.streak++;
        state.lastWorkoutDate = isoDate;
      }

      localStorage.setItem("wk:" + state.activeDay, JSON.stringify(payload));
      localStorage.setItem("gymStats", JSON.stringify({ streak: state.streak, lastWorkoutDate: state.lastWorkoutDate }));

      state.prevSessions[state.activeDay] = payload;
      document.getElementById('streak-count').textContent = state.streak;
      
      showToast();
      if(navigator.vibrate) navigator.vibrate(100);
      render();
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 3000);
    }

    function fmt(s){ return Math.floor(s/60)+":"+(s%60<10?"0":"")+s%60; }
    function startTimer(s){
      if(timerInterval) clearInterval(timerInterval);
      state.timerSecs=s; state.timerMax=s; state.timerActive=true;
      if(navigator.vibrate) navigator.vibrate(50);
      timerInterval=setInterval(()=>{
        state.timerSecs--;
        if(state.timerSecs<=0){
          clearInterval(timerInterval); state.timerActive=false; state.timerSecs=0;
          if(navigator.vibrate) navigator.vibrate([200, 100, 200]);
        }
        renderTimer();
      },1000);
      renderTimer();
    }
    function stopTimer(){
      if(timerInterval) clearInterval(timerInterval);
      state.timerActive=false; state.timerSecs=0; state.timerMax=0;
      renderTimer();
    }

    function renderTimer() {
      const el = document.getElementById("active-timer-area");
      if(!el) return;
      if(!state.timerActive) { el.innerHTML = ""; return; }
      const pct = state.timerMax > 0 ? (state.timerSecs / state.timerMax) * 100 : 0;
      const col = state.timerSecs > 60 ? "var(--accent-blue)" : state.timerSecs > 20 ? "#f59e0b" : "#ef4444";
      el.innerHTML = `
        <div class="active-timer-card">
          <div class="t-num" style="color:${col}">${fmt(state.timerSecs)}</div>
          <div class="t-progress-bg"><div class="t-progress-fill" style="width:${pct}%; background-color:${col}"></div></div>
          <button class="timer-btn" onclick="stopTimer()">X</button>
        </div>
      `;
    }

    function render() {
      const app = document.getElementById("app");
      const isT = TRAIN_DAYS.includes(state.activeDay);
      const day = R[state.activeDay];

      let html = `<div class="tabs-container">`;
      for(const d of ALL_DAYS){
        const isRest = !TRAIN_DAYS.includes(d);
        const isAct = d === state.activeDay;
        const cls = `day-btn ${isAct ? 'active' : ''} ${isRest ? 'rest' : ''}`;
        html += `<button class="${cls}" onclick="setDay('${d}')">${d.slice(0,3)}</button>`;
      }
      html += `</div>`;

      html += `<div id="active-timer-area"></div>`;

      if(!isT){
        html += `<div class="rest-card"><h3>Día de descanso</h3><p>Come bien, hidrátate y duerme 8-9h. El músculo crece mientras descansas.</p></div>`;
      } else {
        const totalEx = day.exercises.length;
        const curIdx = state.currentExerciseIndex;
        const ex = day.exercises[curIdx];
        const prev = state.prevSessions[state.activeDay];
        
        // Progress Bar
        const pct = ((curIdx) / totalEx) * 100;
        html += `
          <div class="progress-text">Ejercicio ${curIdx + 1} de ${totalEx}</div>
          <div class="progress-container">
            <div class="progress-bar" style="width: ${pct}%"></div>
          </div>
        `;

        // Render current exercise
        const mc = MC[ex.muscle] || {bg:"rgba(255,255,255,0.1)", c:"#fff"};
        const entryEx = state.entry[ex.id] || [];
        
        html += `<div class="ex-card">
          <div class="muscle-badge" style="background:${mc.bg};color:${mc.c}">${ex.muscle}</div>
          <div class="ex-header">
            <div class="ex-title">${ex.name}</div>
            <button class="timer-btn" onclick="startTimer(${ex.restS})">⏱ ${ex.rest}</button>
          </div>
          <div class="set-grid">
            <div></div><div class="set-grid-header">Peso</div><div class="set-grid-header">Reps</div><div class="set-grid-header" style="text-transform:none">Última</div>
          </div>`;

        for(let i=0; i<ex.sets; i++){
          const s = entryEx[i] || {w:"", r:"", u:"kg"};
          const p = prev?.data?.[ex.id]?.[i];
          const prevTxt = p ? `${p.w||"—"}${p.u||"kg"} × ${p.r||"—"}` : "—";
          
          const isImproved = p && (parseFloat(s.w) > parseFloat(p.w) || (parseFloat(s.w) === parseFloat(p.w) && parseFloat(s.r) > parseFloat(p.r) && parseFloat(s.w)>0));
          const impCls = isImproved ? 'improved' : '';
          const impTxtCls = isImproved ? 'improved-text' : '';

          html += `
            <div class="set-grid">
              <div style="font-size:12px; font-weight:600; color:var(--text-secondary); text-align:center;">S${i+1}</div>
              
              <div id="grp_${ex.id}_${i}_w" class="weight-input-group ${impCls}">
                <input class="set-inp-w" type="number" inputmode="decimal" placeholder="—" value="${s.w}" oninput="updateSet('${ex.id}',${i},'w',this.value)">
                <select class="unit-select" onchange="updateSet('${ex.id}',${i},'u',this.value)">
                  <option value="kg" ${s.u==='kg'?'selected':''}>kg</option>
                  <option value="lbs" ${s.u==='lbs'?'selected':''}>lbs</option>
                  <option value="p" ${s.u==='placas'?'selected':''}>p</option>
                </select>
              </div>

              <input id="inp_${ex.id}_${i}_r" class="set-inp-r ${impCls}" type="number" inputmode="numeric" placeholder="—" value="${s.r}" oninput="updateSet('${ex.id}',${i},'r',this.value)">
              <div id="prev_${ex.id}_${i}" class="prev-val ${impTxtCls}">${prevTxt}</div>
            </div>`;
        }
        
        html += `<div class="ex-footer"><span>Objetivo: <strong style="color:var(--text-primary)">${ex.range} reps</strong></span></div></div>`;
        
        html += `<div style="display:flex; gap:10px; margin-top:20px;">`;
        if (curIdx > 0) {
          html += `<button class="next-btn" style="width: auto; padding: 14px 20px; background: transparent; border-color: var(--border-color); color: var(--text-secondary);" onclick="prevExercise()">Atrás</button>`;
        }
        
        if (curIdx < totalEx - 1) {
          html += `<button class="next-btn" style="flex:1;" onclick="nextExercise()">Siguiente Ejercicio →</button>`;
        } else {
          html += `<button class="save-btn" style="flex:1; margin-top:10px;" onclick="saveSession()">Guardar Día Completado 🎉</button>`;
        }
        html += `</div>`;
      }

      app.innerHTML = html;
      renderTimer();
    }

    window.addEventListener('DOMContentLoaded', init);

    // Register Service Worker for Offline PWA support
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(reg => console.log('Service Worker registrado', reg))
          .catch(err => console.error('Error al registrar Service Worker', err));
      });
    }
  </script>
</body>
</html>
